<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHANMIN ZZANGZZANG MAN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.18), transparent 24%),
        linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
      font-family: "Segoe UI", Arial, sans-serif;
      color: #f8fafc;
      padding: 30px;
    }

    .wrapper {
      width: min(1200px, 94%);
      text-align: center;
    }

    h1 {
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 900;
      letter-spacing: -1.5px;
      margin-bottom: 10px;
      color: #ffffff;
    }

    h2 {
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 700;
      color: #93c5fd;
      margin-bottom: 34px;
    }

    .image-box {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      padding: 18px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    .image-box img {
      width: 100%;
      max-height: 720px;
      object-fit: cover;
      border-radius: 20px;
      display: block;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    @media (max-width: 768px) {
      .image-box {
        padding: 12px;
        border-radius: 20px;
      }

      .image-box img {
        max-height: 500px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>CHANMIN <br/> ZZANG ZZANG MAN</h1>
    <h2>Automatic Deployment Verified</h2>

    <div class="image-box">
      <img src="test.png" alt="Deployment Verification Image" />
    </div>
  </div>
</body>
</html>
